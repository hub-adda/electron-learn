name: Build & Release

on:
  push:
    tags:
      - 'v*'       # triggers on version tags like v1.0.0
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # macOS code signing (optional – skip if you have no Apple Developer cert)
      - name: Build & Publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # CSC_LINK: ${{ secrets.CSC_LINK }}           # base64 .p12 cert (optional)
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }} # cert password (optional)
        run: npm run build:mac

      - name: Build & Publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:win

      - name: Build & Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.label }}
          path: dist/
          if-no-files-found: ignore
